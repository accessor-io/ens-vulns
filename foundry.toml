[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib', 'contracts']
solc = "0.8.17"
auto_detect_solc = false
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "@ensdomains/=node_modules/@ensdomains/",
    "forge-std/=contracts/forge-std/src/",
    "ds-test/=lib/ds-test/src/"
]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
local = "http://localhost:8545"